<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - Baby Bennie</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --main: #F6A5C9;
            --bg: #FFF0F6;
            --dark: #E889B5;
        }
        body {
            background-color: var(--bg);
            font-family: 'Mitr', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(246, 165, 201, 0.3);
            border: 2px solid var(--main);
            text-align: center;
            width: 90%;
            max-width: 380px;
        }
        .logo-area {
            width: 80px;
            height: 80px;
            background: var(--bg);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }
        h2 { color: var(--dark); margin-bottom: 10px; }
        p { color: #888; font-size: 14px; margin-bottom: 25px; }
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #ffe1ef;
            border-radius: 15px;
            outline: none;
            text-align: center;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--main); box-shadow: 0 0 8px rgba(246, 165, 201, 0.2); }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--main);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: var(--dark); transform: translateY(-2px); }
        .error-msg {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

<div class="login-box">
    <div class="logo-area">🎀</div>
    <h2>Baby Bennie</h2>
    <p>กรุณากรอกรหัสผ่านเพื่อเข้าชมร้านค้า</p>
    
    <input type="password" id="passInput" placeholder="รหัสผ่าน">
    
    <button onclick="validate()">เข้าสู่หน้าเว็บ</button>
    
    <div id="error" class="error-msg">❌ รหัสผ่านไม่ถูกต้อง กรุณาลองใหม่</div>
</div>

<script>
    function validate() {
        const input = document.getElementById('passInput').value;
        const error = document.getElementById('error');
        
        // --- ส่วนที่แก้ไขได้ ---
        const correctPassword = "BENNIE123"; // แก้ไขรหัสผ่านที่ต้องการตรงนี้
        const targetPage = "main.html";      // ชื่อไฟล์หน้าที่เราต้องการให้ไป
        // -----------------------

        if (input === correctPassword) {
            window.location.href = targetPage;
        } else {
            error.style.display = 'block';
            document.getElementById('passInput').value = "";
        }
    }

    // ฟังก์ชันให้กด Enter แล้วเข้าได้เลย
    document.getElementById('passInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            validate();
        }
    });
</script>

</body>
</html>

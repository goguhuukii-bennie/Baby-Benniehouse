<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - Baby Bennie</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --main: #F6A5C9;
            --bg: #FFF0F6;
            --dark: #E889B5;
        }
        body {
            background-color: var(--bg);
            font-family: 'Mitr', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* --- Emoji Rain --- */
        .emoji-fall {
            position: fixed;
            top: -50px;
            z-index: -1;
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* --- Login Box --- */
        .login-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(246, 165, 201, 0.3);
            border: 2px solid var(--main);
            text-align: center;
            width: 90%;
            max-width: 380px;
            backdrop-filter: blur(8px);
            z-index: 10;
        }
        .logo-area {
            width: 80px;
            height: 80px;
            background: var(--bg);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
        }
        h2 { color: var(--dark); margin-bottom: 5px; }
        p { color: #888; font-size: 14px; margin-bottom: 25px; }
        
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #ffe1ef;
            border-radius: 15px;
            outline: none;
            text-align: center;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--main);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: var(--dark); }
        
        .error-msg {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }

        /* --- Music Button --- */
        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 12px;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(246, 165, 201, 0.4);
            cursor: pointer;
            font-size: 20px;
            border: 2px solid var(--main);
            z-index: 100;
            transition: 0.3s;
        }
    </style>
</head>
<body>

<audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
</audio>

<div class="login-box">
    <div class="logo-area">🎀</div>
    <h2>Baby Bennie</h2>
    <p>กรุณากรอกรหัสผ่านเพื่อเข้าชมร้านค้า</p>
    <input type="password" id="passInput" placeholder="รหัสผ่าน" autofocus>
    <button onclick="validate()">เข้าสู่หน้าเว็บ</button>
    <div id="error" class="error-msg">❌ รหัสผ่านไม่ถูกต้อง กรุณาลองใหม่</div>
</div>

<div class="music-control" onclick="toggleMusic()" id="musicBtn">🔈</div>

<script>
    // 1. ระบบ Emoji Rain
    const emojis = ['🌷', '🐶', '⭐️', '🐋'];
    function createEmoji() {
        const emoji = document.createElement('div');
        emoji.className = 'emoji-fall';
        emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        emoji.style.left = Math.random() * 100 + "vw";
        const size = Math.random() * 12 + 18;
        emoji.style.fontSize = size + "px";
        const duration = Math.random() * 4 + 4;
        emoji.style.animationDuration = duration + "s";
        emoji.style.opacity = Math.random() * 0.3 + 0.5;
        document.body.appendChild(emoji);
        setTimeout(() => emoji.remove(), duration * 1000);
    }
    setInterval(createEmoji, 400);

    // 2. ระบบจัดการเสียง
    const audio = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');

    function toggleMusic() {
        if (audio.paused) {
            audio.play();
            musicBtn.innerText = "🔊";
        } else {
            audio.pause();
            musicBtn.innerText = "🔈";
        }
    }

    // คลิกครั้งแรกที่หน้าจอเพื่อให้เพลงเริ่ม (กฎความปลอดภัยเบราว์เซอร์)
    document.body.addEventListener('click', function() {
        if (audio.paused) {
            audio.play();
            musicBtn.innerText = "🔊";
        }
    }, { once: true });

    // 3. ระบบรหัสผ่าน
    function validate() {
        const input = document.getElementById('passInput').value;
        const correctPassword = "BENNIE123"; 
        if (input === correctPassword) {
            window.location.href = "main.html";
        } else {
            document.getElementById('error').style.display = 'block';
            document.getElementById('passInput').value = "";
        }
    }
    document.getElementById('passInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') validate(); });
</script>

</body>
</html>

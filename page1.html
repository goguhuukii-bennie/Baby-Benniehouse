<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>กลุ่มในเครือ MSB - Baby Bennie</title>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
<style>
    :root{ --bg:#FFF0F6; --main:#F6A5C9; --dark:#E889B5; --white:#FFFFFF; --purple:#E2D1F9; }
    body{ background:var(--bg); font-family:'Mitr',sans-serif; display:flex; justify-content:center; padding:20px; margin:0; overflow-x: hidden; position: relative; }
    .container{ max-width:600px; width:100%; z-index: 1; }
    .section{ background:var(--white); border-radius:25px; overflow:hidden; border:2px solid var(--main); box-shadow:0 8px 20px rgba(0,0,0,0.05); padding-bottom: 25px; }
    .header-img { width: 100%; display: block; border-bottom: 2px solid var(--main); }
    .title-bar { background: var(--purple); color: #333; text-align: center; padding: 10px; font-weight: 500; font-size: 18px; }
    table { width: 100%; border-collapse: collapse; }
    th { background-color: #f8f9fa; color: var(--dark); padding: 12px 5px; border-bottom: 2px solid #eee; font-size: 13px; }
    td { padding: 10px 5px; border-bottom: 1px solid #ffeef5; color: #555; text-align: center; font-size: 12px; vertical-align: middle; }
    .product-img { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; border: 1px solid #eee; cursor: zoom-in; }
    .type-badge { padding: 2px 6px; border-radius: 10px; font-size: 10px; color: white; display: inline-block; min-width: 60px; }
    .type-ชิ้นส่วน { background: #FFD25A; } .type-บล็อก { background: #8CD4B0; } .type-เอฟเฟค { background: #B298E1; }
    .type-ลายเส้น { background: #FF90C2; } .type-ฟอนต์ { background: #E15A7A; } .type-ตูน { background: #F2A25C; }
    .price-old { color: #555; font-size: 12px; }
    .price-admin { font-weight: bold; color: #E15A7A; font-size: 13px; }
    .btn-back { display: block; text-align: center; padding: 12px; background: var(--main); color: white; text-decoration: none; border-radius: 25px; font-weight: 500; margin: 20px; }

    /* --- สไตล์ Modal (ป๊อปอัพขยายรูป) --- */
    .modal {
        display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%;
        background-color: rgba(0,0,0,0.8); backdrop-filter: blur(5px); justify-content: center; align-items: center; padding: 20px;
    }
    .modal-content {
        background: white; padding: 15px; border-radius: 25px; max-width: 90%; max-height: 90%; 
        text-align: center; position: relative; animation: zoomIn 0.3s;
    }
    @keyframes zoomIn { from {transform: scale(0.5);} to {transform: scale(1);} }
    .modal-img { width: 100%; max-width: 350px; border-radius: 15px; margin-bottom: 15px; border: 2px solid var(--main); }
    .modal-text { color: var(--dark); font-size: 16px; font-weight: 500; line-height: 1.5; padding: 0 10px; }
    .close-btn { position: absolute; top: -15px; right: -15px; background: var(--main); color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid white; font-weight: bold; }

    /* อิโมจิหล่น */
    .emoji-fall { position: fixed; top: -50px; z-index: 0; user-select: none; pointer-events: none; animation: fall linear forwards; }
    @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    
    /* ปุ่มเพลง */
    .music-btn { position: fixed; bottom: 20px; right: 20px; width: 40px; height: 40px; background: white; border: 2px solid var(--main); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; font-size: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
</style>
</head>
<body>

<audio id="bgMusic" loop><source src="1.mp3" type="audio/mpeg"></audio>
<div class="music-btn" onclick="toggleMusic()" id="musicIcon">🔇</div>

<div id="myModal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="close-btn" onclick="closeModal()">✕</div>
        <img id="imgBig" class="modal-img" src="">
        <div id="descBig" class="modal-text"></div>
    </div>
</div>

<div class="container">
    <div class="section">
        <img src="12.png" alt="Header" class="header-img">
        <div class="title-bar">รายการกลุ่มในเครือ</div>
        <table>
            <thead>
                <tr>
                    <th>รูป</th>
                    <th>ชื่อกลุ่ม</th>
                    <th>ประเภท</th>
                    <th>ราคาปกติ</th>
                    <th>โอนแอดมิน</th>
                </tr>
            </thead>
            <tbody id="data-body"></tbody>
        </table>
        <a href="main.html" class="btn-back">กลับหน้าหลัก 🎀</a>
    </div>
</div>

<script>
    const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSac_ZH2_OR2X_sT9EnZLqXuzqO7IBxJo5qChEsuR1w8RsGCBDxb1jpVLf_n3p7hBORcagesRlm4wmx/pub?gid=515002157&single=true&output=csv';
    
    async function fetchData() {
        try {
            const response = await fetch(sheetURL);
            const data = await response.text();
            const rows = data.split(/\r?\n/);
            let html = '';
            
            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 5 && cols[1].trim() !== "" && !cols[1].includes("ชื่อกลุ่ม")) {
                    
                    let imgRaw = cols[0] ? cols[0].replace(/"/g, '').trim().replace(/^Https:/i, 'https:') : '';
                    const name = cols[1].replace(/"/g, '').trim();   
                    const type = cols[2].replace(/"/g, '').trim();   
                    const priceD = cols[3].replace(/"/g, '').trim(); 
                    const priceE = cols[4].replace(/"/g, '').trim(); 
                    const desc = cols[5] ? cols[5].replace(/"/g, '').trim() : "ไม่มีรายละเอียดเพิ่มเติม"; // ดึงจากคอลัมน์ F

                    let badgeClass = 'type-' + type.replace('กลุ่ม', '').trim();
                    const displayImg = imgRaw ? imgRaw : 'https://via.placeholder.com/40';
                    
                    html += `<tr>
                        <td>
                            <img src="${displayImg}" class="product-img" 
                                 onclick="openModal('${displayImg}', '${name}<br>${desc}')"
                                 onerror="this.src='https://via.placeholder.com/40/fff0f6/e889b5?text=MSB'">
                        </td>
                        <td style="text-align:left; font-weight:500;">${name}</td>
                        <td><span class="type-badge ${badgeClass}">${type}</span></td>
                        <td class="price-old">${priceD}.-</td>
                        <td class="price-admin">${priceE}.-</td>
                    </tr>`;
                }
            }
            document.getElementById('data-body').innerHTML = html;
        } catch (e) { document.getElementById('data-body').innerHTML = '❌ โหลดไม่สำเร็จ'; }
    }

    // ฟังก์ชันเปิด/ปิด Modal
    function openModal(src, text) {
        document.getElementById('imgBig').src = src;
        document.getElementById('descBig').innerHTML = text;
        document.getElementById('myModal').style.display = 'flex';
    }
    function closeModal() {
        document.getElementById('myModal').style.display = 'none';
    }

    fetchData();

    // ระบบเพลง & อิโมจิ (เหมือนเดิม)
    const audio = document.getElementById('bgMusic');
    function toggleMusic() {
        if (audio.paused) { audio.play(); document.getElementById('musicIcon').innerText = "🎵"; }
        else { audio.pause(); document.getElementById('musicIcon').innerText = "🔇"; }
    }
    document.body.addEventListener('click', () => { if(audio.paused) { audio.play(); document.getElementById('musicIcon').innerText = "🎵"; } }, { once: true });
    setInterval(() => {
        const emoji = document.createElement('div');
        emoji.className = 'emoji-fall';
        emoji.innerText = ['🌷', '🐶', '⭐️', '🐋'][Math.floor(Math.random() * 4)];
        emoji.style.left = Math.random() * 100 + "vw";
        const duration = Math.random() * 3 + 4;
        emoji.style.animationDuration = duration + "s";
        document.body.appendChild(emoji);
        setTimeout(() => emoji.remove(), duration * 1000);
    }, 500);
</script>
</body>
</html>

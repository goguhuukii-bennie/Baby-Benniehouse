<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>กลุ่มในเครือ MSB - Baby Bennie</title>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
<style>
    :root{ --bg:#FFF0F6; --main:#F6A5C9; --dark:#E889B5; --white:#FFFFFF; --purple:#E2D1F9; }
    body{ background:var(--bg); font-family:'Mitr',sans-serif; display:flex; justify-content:center; padding:20px; margin:0; overflow-x: hidden; position: relative; }
    .container{ max-width:600px; width:100%; z-index: 1; }
    .section{ background:var(--white); border-radius:25px; overflow:hidden; border:2px solid var(--main); box-shadow:0 8px 20px rgba(0,0,0,0.05); padding-bottom: 25px; }
    .header-img { width: 100%; display: block; border-bottom: 2px solid var(--main); }
    .title-bar { background: var(--purple); color: #333; text-align: center; padding: 10px; font-weight: 500; font-size: 18px; }
    table { width: 100%; border-collapse: collapse; }
    th { background-color: #f8f9fa; color: var(--dark); padding: 12px 5px; border-bottom: 2px solid #eee; font-size: 12px; }
    td { padding: 10px 5px; border-bottom: 1px solid #ffeef5; color: #555; text-align: center; font-size: 12px; vertical-align: middle; }
    .product-img { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; border: 1px solid #eee; cursor: pointer; }
    .type-badge { padding: 2px 6px; border-radius: 10px; font-size: 10px; color: white; display: inline-block; min-width: 60px; }
    .type-ชิ้นส่วน { background: #FFD25A; } .type-บล็อก { background: #8CD4B0; } .type-เอฟเฟค { background: #B298E1; }
    .type-ลายเส้น { background: #FF90C2; } .type-ฟอนต์ { background: #E15A7A; } .type-ตูน { background: #F2A25C; }
    .price-admin { font-weight: bold; color: #E15A7A; font-size: 13px; }
    .btn-back { display: block; text-align: center; padding: 12px; background: var(--main); color: white; text-decoration: none; border-radius: 25px; font-weight: 500; margin: 20px; }

    /* --- Modal ปรับปรุงใหม่เพื่อตัวแทน --- */
    .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); justify-content: center; align-items: center; padding: 15px; }
    .modal-content { background: white; padding: 20px; border-radius: 25px; width: 100%; max-width: 350px; text-align: center; position: relative; max-height: 85vh; overflow-y: auto; }
    .modal-img { width: 160px; height: 160px; object-fit: cover; border-radius: 15px; border: 2px solid var(--main); margin-bottom: 15px; }
    .modal-text { color: #555; font-size: 13px; text-align: left; white-space: pre-wrap; padding: 12px; background: #fff9fb; border-radius: 15px; border: 1px solid #ffe1ef; line-height: 1.5; margin-bottom: 15px; }
    
    /* ปุ่มก๊อปปี้ */
    .copy-btn { background: var(--main); color: white; border: none; padding: 10px 20px; border-radius: 15px; cursor: pointer; font-family: 'Mitr', sans-serif; font-size: 14px; width: 100%; transition: 0.3s; }
    .copy-btn:active { transform: scale(0.95); background: var(--dark); }

    .close-btn { position: absolute; top: 10px; right: 10px; color: #bbb; font-size: 20px; cursor: pointer; }
    .emoji-fall { position: fixed; top: -50px; z-index: 0; pointer-events: none; animation: fall linear forwards; }
    @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    .music-btn { position: fixed; bottom: 20px; right: 20px; width: 40px; height: 40px; background: white; border: 2px solid var(--main); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
</style>
</head>
<body>

<audio id="bgMusic" loop><source src="1.mp3" type="audio/mpeg"></audio>
<div class="music-btn" onclick="toggleMusic()" id="musicIcon">🔇</div>

<div id="myModal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="closeModal()">✕</span>
        <img id="imgBig" class="modal-img" src="">
        <div id="descBig" class="modal-text"></div>
        <button class="copy-btn" id="copyBtn" onclick="copyText()">📋 คัดลอกรายละเอียด</button>
    </div>
</div>

<div class="container">
    <div class="section">
        <img src="12.png" class="header-img">
        <div class="title-bar">รายการกลุ่มในเครือ</div>
        <table>
            <thead>
                <tr>
                    <th>รูป</th>
                    <th>ชื่อกลุ่ม</th>
                    <th>ประเภท</th>
                    <th>ค่าเข้าปกติ</th>
                    <th>เรทโอนแอดมิน</th>
                </tr>
            </thead>
            <tbody id="data-body"></tbody>
        </table>
        <a href="main.html" class="btn-back">กลับหน้าหลัก 🎀</a>
    </div>
</div>

<script>
    const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSac_ZH2_OR2X_sT9EnZLqXuzqO7IBxJo5qChEsuR1w8RsGCBDxb1jpVLf_n3p7hBORcagesRlm4wmx/pub?gid=515002157&single=true&output=csv';

    async function fetchData() {
        try {
            const res = await fetch(sheetURL);
            const csvText = await res.text();
            
            // ฟังก์ชันแยกคอลัมน์แบบพิเศษ (รองรับคอมม่าภายในข้อความ)
            function parseCSVRow(row) {
                const result = [];
                let start = 0;
                let inQuotes = false;
                for (let i = 0; i < row.length; i++) {
                    if (row[i] === '"') inQuotes = !inQuotes;
                    if (row[i] === ',' && !inQuotes) {
                        result.push(row.substring(start, i));
                        start = i + 1;
                    }
                }
                result.push(row.substring(start));
                return result.map(val => val.replace(/^"|"$/g, '').trim());
            }

            const rows = csvText.split(/\r?\n/);
            let html = '';
            
            for (let i = 1; i < rows.length; i++) {
                if (!rows[i].trim()) continue;
                
                // ใช้ฟังก์ชันใหม่แยกคอลัมน์
                const cols = parseCSVRow(rows[i]);
                
                if (cols.length >= 2 && cols[1] !== "" && !cols[1].includes("ชื่อกลุ่ม")) {
                    let img = cols[0] ? cols[0].replace(/^Https:/i, 'https:') : '';
                    let name = cols[1] || '';
                    let type = cols[2] || '';
                    let p1 = cols[3] || '-';
                    let p2 = cols[4] || '-';
                    let desc = cols[5] || 'ไม่มีรายละเอียดเพิ่มเติม';

                    let badge = 'type-' + type.replace('กลุ่ม', '').trim();
                    const displayImg = img ? img : 'https://via.placeholder.com/45/fff0f6/e889b5?text=MSB';
                    
                    html += `<tr>
                        <td><img src="${displayImg}" class="product-img" onclick="openModal('${displayImg}', '${desc.replace(/'/g, "\\'")}')" onerror="this.src='https://via.placeholder.com/45/fff0f6/e889b5?text=MSB'"></td>
                        <td style="text-align:left; font-weight:500;">${name}</td>
                        <td><span class="type-badge ${badge}">${type}</span></td>
                        <td>${p1}.-</td>
                        <td class="price-admin">${p2}.-</td>
                    </tr>`;
                }
            }
            document.getElementById('data-body').innerHTML = html;
        } catch (e) { 
            console.error(e);
            document.getElementById('data-body').innerHTML = '<tr><td colspan="5">❌ โหลดไม่สำเร็จ กรุณารีเฟรช</td></tr>'; 
        }
    }

    function openModal(s, t) {
        document.getElementById('imgBig').src = s;
        document.getElementById('descBig').innerText = t;
        document.getElementById('myModal').style.display = 'flex';
        document.getElementById('copyBtn').innerText = "📋 คัดลอกรายละเอียด";
    }

    function closeModal() { document.getElementById('myModal').style.display = 'none'; }

    function copyText() {
        const text = document.getElementById('descBig').innerText;
        navigator.clipboard.writeText(text).then(() => {
            document.getElementById('copyBtn').innerText = "✅ คัดลอกแล้ว!";
            setTimeout(() => { document.getElementById('copyBtn').innerText = "📋 คัดลอกรายละเอียด"; }, 2000);
        });
    }

    const audio = document.getElementById('bgMusic');
    function toggleMusic() {
        if (audio.paused) { audio.play(); document.getElementById('musicIcon').innerText = "🎵"; }
        else { audio.pause(); document.getElementById('musicIcon').innerText = "🔇"; }
    }
    document.body.addEventListener('click', () => { if(audio.paused) audio.play(); document.getElementById('musicIcon').innerText = "🎵"; }, { once: true });

    setInterval(() => {
        const e = document.createElement('div');
        e.className = 'emoji-fall';
        e.innerText = ['🌷', '🐶', '⭐️', '🐋', '🩷'][Math.floor(Math.random() * 5)];
        e.style.left = Math.random() * 100 + "vw";
        e.style.animationDuration = (Math.random() * 2 + 3) + "s";
        document.body.appendChild(e);
        setTimeout(() => e.remove(), 5000);
    }, 700);

    fetchData();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>กลุ่มในเครือ MSB - Baby Bennie</title>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
<style>
    :root{ --bg:#FFF0F6; --main:#F6A5C9; --dark:#E889B5; --white:#FFFFFF; --purple:#E2D1F9; }
    body{ background:var(--bg); font-family:'Mitr',sans-serif; display:flex; justify-content:center; padding:20px; margin:0; }
    .container{ max-width:600px; width:100%; } /* ขยายกว้างขึ้นนิดนึงเพื่อให้พอดี 5 คอลัมน์ */
    .section{ background:var(--white); border-radius:25px; overflow:hidden; border:2px solid var(--main); box-shadow:0 8px 20px rgba(0,0,0,0.05); padding-bottom: 25px; }
    .header-img { width: 100%; display: block; border-bottom: 2px solid var(--main); }
    .title-bar { background: var(--purple); color: #333; text-align: center; padding: 10px; font-weight: 500; font-size: 18px; }
    table { width: 100%; border-collapse: collapse; }
    th { background-color: #f8f9fa; color: var(--dark); padding: 12px 5px; border-bottom: 2px solid #eee; font-size: 13px; }
    td { padding: 10px 5px; border-bottom: 1px solid #ffeef5; color: #555; text-align: center; font-size: 12px; vertical-align: middle; }
    
    .product-img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; border: 1px solid #eee; }
    .type-badge { padding: 2px 6px; border-radius: 10px; font-size: 10px; color: white; display: inline-block; min-width: 60px; }
    
    /* สี Badge */
    .type-ชิ้นส่วน { background: #FFD25A; }
    .type-บล็อก { background: #8CD4B0; }
    .type-เอฟเฟค { background: #B298E1; }
    .type-ลายเส้น { background: #FF90C2; }
    .type-ฟอนต์ { background: #E15A7A; }
    
    .price-old { text-decoration: line-through; color: #999; font-size: 11px; } /* สไตล์ราคาปกติ (D) */
    .price-admin { font-weight: bold; color: #E15A7A; font-size: 13px; } /* สไตล์โอนแอดมิน (E) */
    
    .btn-back { display: block; text-align: center; padding: 12px; background: var(--main); color: white; text-decoration: none; border-radius: 25px; font-weight: 500; margin: 20px; }
</style>
</head>
<body>
<div class="container">
    <div class="section">
        <img src="12.png" alt="Header" class="header-img">
        <div class="title-bar">รายการกลุ่มในเครือ</div>
        <table>
            <thead>
                <tr>
                    <th>รูป</th>
                    <th>ชื่อกลุ่ม</th>
                    <th>ประเภท</th>
                    <th>ราคาปกติ</th> <th>โอนแอดมิน</th> </tr>
            </thead>
            <tbody id="data-body">
                <tr><td colspan="5" style="text-align:center; padding:20px;">🎀 กำลังดึงข้อมูลล่าสุด...</td></tr>
            </tbody>
        </table>
        <a href="main.html" class="btn-back">กลับหน้าหลัก 🎀</a>
    </div>
</div>

<script>
    const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSac_ZH2_OR2X_sT9EnZLqXuzqO7IBxJo5qChEsuR1w8RsGCBDxb1jpVLf_n3p7hBORcagesRlm4wmx/pub?gid=515002157&single=true&output=csv';

    async function fetchData() {
        try {
            const response = await fetch(sheetURL);
            const data = await response.text();
            const rows = data.split(/\r?\n/);
            let html = '';
            
            for (let i = 3; i < rows.length; i++) {
                const cols = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                if (cols.length >= 5 && cols[1].trim() !== "") {
                    const img = cols[0].replace(/"/g, '').trim();    // A
                    const name = cols[1].replace(/"/g, '').trim();   // B
                    const type = cols[2].replace(/"/g, '').trim();   // C
                    const priceD = cols[3].replace(/"/g, '').trim(); // D (ราคาปกติ)
                    const priceE = cols[4].replace(/"/g, '').trim(); // E (โอนแอดมิน)
                    
                    let cleanType = type.replace('กลุ่ม', '').trim();
                    const badgeClass = `type-${cleanType}`;
                    const displayImg = img ? img : 'https://via.placeholder.com/40/fff0f6/e889b5?text=MSB';
                    
                    html += `
                        <tr>
                            <td><img src="${displayImg}" class="product-img" onerror="this.src='https://via.placeholder.com/40/fff0f6/e889b5?text=MSB'"></td>
                            <td style="text-align:left; font-weight:500;">${name}</td>
                            <td><span class="type-badge ${badgeClass}">${type}</span></td>
                            <td class="price-old">${priceD}.-</td>
                            <td class="price-admin">${priceE}.-</td>
                        </tr>`;
                }
            }
            document.getElementById('data-body').innerHTML = html;
        } catch (e) {
            document.getElementById('data-body').innerHTML = '<tr><td colspan="5">❌ โหลดไม่สำเร็จ</td></tr>';
        }
    }
    fetchData();
</script>
</body>
</html>

<script>
    const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSac_ZH2_OR2X_sT9EnZLqXuzqO7IBxJo5qChEsuR1w8RsGCBDxb1jpVLf_n3p7hBORcagesRlm4wmx/pub?gid=515002157&single=true&output=csv';
    
    async function fetchData() {
        try {
            const response = await fetch(sheetURL);
            const data = await response.text();
            
            // แยกบรรทัดข้อมูล
            const rows = data.split(/\r?\n/);
            let html = '';
            
            // เริ่มวนลูปตั้งแต่แถวที่ 2 (i=1)
            for (let i = 1; i < rows.length; i++) {
                if (!rows[i]) continue; // ถ้าบรรทัดว่างให้ข้าม

                // ใช้ Regex แยกคอมม่าแบบฉลาด (กันปัญหาเครื่องหมายพิเศษในช่อง F)
                const cols = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                // เช็คว่ามีชื่อกลุ่ม (คอลัมน์ B) หรือไม่ ถ้ามีให้แสดงผลเลย
                if (cols.length >= 2 && cols[1] && cols[1].trim() !== "" && !cols[1].includes("ชื่อกลุ่ม")) {
                    
                    // ดึงข้อมูลแต่ละช่องแบบระวังตัวพิมพ์ใหญ่/เล็ก และช่องว่าง
                    let imgRaw = cols[0] ? cols[0].replace(/"/g, '').trim() : '';
                    if (imgRaw.toLowerCase().startsWith('http')) {
                        imgRaw = imgRaw.replace(/^Https:/i, 'https:');
                    }

                    const name = cols[1] ? cols[1].replace(/"/g, '').trim() : 'ไม่มีชื่อกลุ่ม';
                    const type = cols[2] ? cols[2].replace(/"/g, '').trim() : 'ทั่วไป';
                    const priceD = cols[3] ? cols[3].replace(/"/g, '').trim() : '-';
                    const priceE = cols[4] ? cols[4].replace(/"/g, '').trim() : '-';
                    
                    // ดึงรายละเอียด (คอลัมน์ F) และจัดการเรื่องการขึ้นบรรทัดใหม่
                    let desc = cols[5] ? cols[5].replace(/"/g, '').trim() : "";
                    desc = desc.replace(/\n/g, '<br>');

                    const badgeClass = 'type-' + type.replace('กลุ่ม', '').trim();
                    const displayImg = imgRaw ? imgRaw : 'https://via.placeholder.com/45/fff0f6/e889b5?text=MSB';
                    
                    html += `<tr>
                        <td>
                            <img src="${displayImg}" class="product-img" 
                                 onclick="openModal('${displayImg}', '<b>${name}</b><br><br>${desc}')"
                                 onerror="this.src='https://via.placeholder.com/45/fff0f6/e889b5?text=MSB'">
                        </td>
                        <td style="text-align:left; font-weight:500;">${name}</td>
                        <td><span class="type-badge ${badgeClass}">${type}</span></td>
                        <td class="price-old">${priceD}.-</td>
                        <td class="price-admin">${priceE}.-</td>
                    </tr>`;
                }
            }
            // ใส่ข้อมูลลงในตาราง
            const targetBody = document.getElementById('data-body') || document.getElementById('font-data-body');
            if (targetBody) targetBody.innerHTML = html;

        } catch (e) { 
            console.error("Fetch Error: ", e);
            const targetBody = document.getElementById('data-body') || document.getElementById('font-data-body');
            if (targetBody) targetBody.innerHTML = '<tr><td colspan="5">❌ โหลดข้อมูลไม่สำเร็จ กรุณารีเฟรชหน้าจอ</td></tr>';
        }
    }

    // ฟังก์ชัน Modal (ขยายรูป)
    function openModal(src, text) {
        const modal = document.getElementById('myModal');
        const imgBig = document.getElementById('imgBig');
        const descBig = document.getElementById('descBig');
        if (modal && imgBig) {
            imgBig.src = src;
            if (descBig) descBig.innerHTML = text;
            modal.style.display = 'flex';
        }
    }
    function closeModal() {
        const modal = document.getElementById('myModal');
        if (modal) modal.style.display = 'none';
    }

    // เริ่มทำงาน
    fetchData();

    // --- ระบบเพลง ---
    const audio = document.getElementById('bgMusic');
    const musicIcon = document.getElementById('musicIcon');
    function toggleMusic() {
        if (!audio) return;
        if (audio.paused) { 
            audio.play(); 
            if(musicIcon) musicIcon.innerText = "🎵"; 
        } else { 
            audio.pause(); 
            if(musicIcon) musicIcon.innerText = "🔇"; 
        }
    }
    document.body.addEventListener('click', () => { 
        if(audio && audio.paused) { 
            audio.play(); 
            if(musicIcon) musicIcon.innerText = "🎵"; 
        } 
    }, { once: true });

    // --- ระบบอิโมจิ ---
    setInterval(() => {
        const emoji = document.createElement('div');
        emoji.className = 'emoji-fall';
        emoji.innerText = ['🌷', '🐶', '⭐️', '🐋', '🩷'][Math.floor(Math.random() * 5)];
        emoji.style.left = Math.random() * 100 + "vw";
        const duration = Math.random() * 3 + 4;
        emoji.style.animationDuration = duration + "s";
        document.body.appendChild(emoji);
        setTimeout(() => emoji.remove(), duration * 1000);
    }, 600);
</script>
